name: Build Android Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Android AAB via EAS
        id: eas-build
        run: |
          npx eas-cli build --platform android --profile production --non-interactive --wait 2>&1 | tee /tmp/eas-output.log
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Upload EAS Build Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eas-build-output
          path: /tmp/eas-output.log
          retention-days: 7
